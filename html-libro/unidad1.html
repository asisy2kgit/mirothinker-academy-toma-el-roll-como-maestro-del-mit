<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codigo 1.1</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f8f9fa;
        }
        h1 {
            color: #1a1a1a;
            border-bottom: 2px solid #eaecef;
            padding-bottom: 10px;
        }
        .code-container {
            background-color: #1e1e1e;
            color: #d4d4d4;
            border-radius: 6px;
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            margin: 20px 0;
        }
        pre {
            margin: 0;
            font-family: "Fira Code", Consolas, Monaco, "Andale Mono", "Ubuntu Mono", monospace;
            font-size: 14px;
        }
        .comment {
            color: #6a9955;
            font-style: italic;
        }
        footer {
            margin-top: 40px;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #eaecef;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Codigo 1.1</h1>

    <div class="code-container">
<pre><code><span class="comment">// HolaMundo.java &gt; Nombre del archivo de hay tomamos el HolaMundo para que sea el nombre de la clase</span>

class HolaMundo {
    public static void main(String[] args) {
        System.out.println("Hola Mundo");
    }
}</code></pre>
    </div>

    <footer>
        <p>Usuario de GitHub: <strong>asisy2kgit</strong></p>
